<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Oxilife Dashboard</title>
<style>:root{--bg:#06151e;--card:#0d2632;--line:#1d3a46;--text:#eefaff;--muted:#8eabb7;--accent:#42c8f5;--green:#42d392;--yellow:#ffd166;--red:#ff5d73}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 50% -15%,#123c50 0,#071b26 38%,#041018 100%);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh}.wrap{max-width:1120px;margin:auto;padding:26px}.hero{text-align:center;padding:25px 12px 32px}.drop{width:48px;height:58px;margin:0 auto 10px;color:var(--accent)}.drop svg{width:100%;height:100%}.hero h1{font-size:clamp(30px,5vw,52px);font-weight:700;letter-spacing:.08em;margin:0}.subtitle{color:var(--muted);margin-top:8px}.connections{display:flex;justify-content:center;gap:18px;flex-wrap:wrap}.connection{display:inline-flex;align-items:center;gap:8px;margin-top:13px;color:var(--muted);font-size:14px}.connection i{width:8px;height:8px;border-radius:50%;background:var(--red)}.connection.online i{background:var(--green);box-shadow:0 0 12px var(--green)}.connection.unconfigured i{background:var(--muted)}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}.card{background:rgba(13,38,50,.9);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 14px 35px #0003;display:grid;grid-template-columns:1fr auto;align-items:center;gap:10px 18px;min-height:145px}.label{color:var(--muted);font-size:15px}.value{font-size:clamp(29px,4vw,43px);font-weight:700;letter-spacing:-.04em;text-align:right}.unit{font-size:16px;color:var(--muted);letter-spacing:0}.state{grid-column:1/-1;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted)}.dot{width:8px;height:8px;border-radius:50%;flex:none}.line{height:5px;flex:1;background:#06151e;border-radius:8px;overflow:hidden}.line i{display:block;height:100%;border-radius:inherit}.perfect .dot,.perfect .line i{background:var(--green)}.critical .dot,.critical .line i{background:var(--yellow)}.bad .dot,.bad .line i{background:var(--red)}.neutral .dot,.neutral .line i{background:var(--muted)}.perfect .line i{width:78%}.critical .line i{width:52%}.bad .line i{width:25%}.neutral .line i{width:0}.card.perfect{border-color:color-mix(in srgb,var(--green) 35%,var(--line))}.card.critical{border-color:color-mix(in srgb,var(--yellow) 40%,var(--line))}.card.bad{border-color:color-mix(in srgb,var(--red) 45%,var(--line))}.empty{grid-column:1/-1;text-align:center;padding:55px;border:1px dashed var(--line);border-radius:18px;color:var(--muted)}.bottom-widgets{display:flex;justify-content:center;align-items:stretch;gap:14px;margin-top:22px;flex-wrap:wrap}.weather,.screen-warning{width:min(480px,100%);background:rgba(13,38,50,.72);border:1px solid var(--line);border-radius:16px;padding:14px 18px;display:flex;align-items:center;justify-content:center;gap:14px;text-align:left}.weather[hidden],.screen-warning[hidden]{display:none}.weather-icon,.warning-icon{font-size:32px}.weather strong,.screen-warning strong{display:block}.weather-detail,.warning-detail{color:var(--muted);font-size:13px;margin-top:3px}.weather a{color:var(--muted);font-size:11px}.screen-warning.critical{border-color:var(--yellow);background:color-mix(in srgb,var(--yellow) 10%,var(--card))}.screen-warning.bad{border-color:var(--red);background:color-mix(in srgb,var(--red) 12%,var(--card))}.footer{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:20px;color:var(--muted);font-size:13px}.footer a{color:var(--muted)}@media(max-width:650px){.wrap{padding:16px}.grid{grid-template-columns:1fr}.hero h1{letter-spacing:.04em}.card{min-height:130px}}</style></head>
<body><main class="wrap"><header class="hero"><div class="drop" aria-hidden="true"><svg viewBox="0 0 48 58" fill="none"><path d="M24 3C18 14 7 25 7 38a17 17 0 0 0 34 0C41 25 30 14 24 3Z" stroke="currentColor" stroke-width="2"/></svg></div><h1>OXILIFE DASHBOARD</h1><div class="subtitle">Wasserqualität auf einen Blick</div><div class="connections"><div id="tasmotaConnection" class="connection"><i></i><span id="tasmotaStatus">Tasmota: Offline</span></div><div id="oxilifeConnection" class="connection unconfigured"><i></i><span id="oxilifeStatus">Oxilife: Nicht konfiguriert</span></div></div></header><section id="grid" class="grid"></section><div class="bottom-widgets"><section id="weather" class="weather" hidden><span id="weatherIcon" class="weather-icon"></span><div><strong><span id="weatherCity"></span> · <span id="weatherTemp"></span></strong><div id="weatherDetail" class="weather-detail"></div><a href="https://open-meteo.com/" target="_blank" rel="noopener">Wetter: Open-Meteo</a> · <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">Ort: © OpenStreetMap</a></div></section><section id="screenWarning" class="screen-warning" hidden><span class="warning-icon">⚠️</span><div><strong id="warningTitle">Warnung</strong><div id="warningDetail" class="warning-detail"></div></div></section></div><footer class="footer"><span id="updated">Keine Daten</span><a href="/admin">Admin</a></footer></main>
<script>const $=x=>document.getElementById(x),esc=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function numeric(p){const n=Number(p.value??0)*Number(p.scale);return Number.isFinite(n)?n:0}function formatted(p){if(p.data_type==='number'){return numeric(p).toLocaleString('de-DE',{minimumFractionDigits:p.decimals,maximumFractionDigits:p.decimals})}if(p.data_type==='boolean')return Number(p.value)?'Ja':'Nein';return p.value===null||p.value===undefined||p.value===''?'–':esc(p.value)}
function quality(p){if(p.data_type!=='number')return {key:'neutral',label:'Status'};const n=numeric(p);if(p.widget_type==='levels'){const low=p.warning_low??p.min_value,high=p.warning_high??p.max_value;if(low!==null&&n<=low)return {key:'perfect',label:'Langsam'};if(high!==null&&n>=high)return {key:'bad',label:'Schnell'};return {key:'critical',label:'Mittel'}}if(p.min_value!==null&&n<p.min_value||p.max_value!==null&&n>p.max_value)return {key:'bad',label:'Schlecht'};if(p.warning_low!==null&&n<p.warning_low||p.warning_high!==null&&n>p.warning_high)return {key:'critical',label:'Kritisch'};if(p.min_value===null&&p.max_value===null&&p.warning_low===null&&p.warning_high===null)return {key:'neutral',label:'Keine Grenzwerte'};return {key:'perfect',label:'Perfekt'}}
function card(p){const q=quality(p);return `<article class="card ${q.key}"><span class="label">${esc(p.name)}</span><span class="value">${formatted(p)} <span class="unit">${esc(p.unit)}</span></span><div class="state ${q.key}"><span class="dot"></span><span>${q.label}</span><span class="line"><i></i></span></div></article>`}function updateWarnings(points){const warnings=points.map(p=>({p,q:quality(p)})).filter(x=>x.p.widget_type!=='levels'&&(x.q.key==='critical'||x.q.key==='bad'));const box=$('screenWarning');box.hidden=!warnings.length;if(!warnings.length)return;const worst=warnings.some(x=>x.q.key==='bad')?'bad':'critical';box.className='screen-warning '+worst;$('warningTitle').textContent=worst==='bad'?'Achtung – Wert außerhalb des Bereichs':'Hinweis – kritischer Wert';$('warningDetail').textContent=warnings.map(x=>x.p.name+': '+formatted(x.p)+(x.p.unit?' '+x.p.unit:'')+' ('+x.q.label+')').join(' · ')}function updateConnections(c){const t=c.tasmota,o=c.oxilife;$('tasmotaStatus').textContent=t.name+': '+(t.online?'Online':'Offline');$('tasmotaConnection').classList.toggle('online',t.online);$('oxilifeStatus').textContent=o.name+': '+(!o.configured?'Nicht konfiguriert':o.online?'Online':'Offline');$('oxilifeConnection').classList.toggle('online',o.online);$('oxilifeConnection').classList.toggle('unconfigured',!o.configured)}async function refresh(){try{const r=await fetch('/api/status'),d=await r.json();$('grid').innerHTML=d.datapoints.length?d.datapoints.map(card).join(''):'<div class="empty">Noch keine Werte freigegeben.</div>';updateWarnings(d.datapoints);updateConnections(d.connections);$('updated').textContent=d.updated_at?'Zuletzt aktualisiert: '+new Date(d.updated_at*1000).toLocaleString('de-DE'):(d.error||'Warte auf erste Daten')}catch(e){$('updated').textContent='Dashboard nicht erreichbar'}}function weatherMeta(code){if(code===0)return['☀️','Klar'];if(code<=3)return['⛅','Bewölkt'];if(code<=48)return['🌫️','Nebel'];if(code<=57)return['🌦️','Nieselregen'];if(code<=67)return['🌧️','Regen'];if(code<=77)return['🌨️','Schnee'];if(code<=82)return['🌦️','Regenschauer'];if(code<=86)return['🌨️','Schneeschauer'];if(code>=95)return['⛈️','Gewitter'];return['🌡️','Wetter']}async function refreshWeather(){try{const r=await fetch('/api/weather'),w=await r.json();$('weather').hidden=!w.enabled;if(!w.enabled)return;const meta=weatherMeta(Number(w.weather_code));$('weatherIcon').textContent=meta[0];$('weatherCity').textContent=w.city;$('weatherTemp').textContent=w.temperature==null?'–':Number(w.temperature).toLocaleString('de-DE',{maximumFractionDigits:1})+' '+w.temperature_unit;$('weatherDetail').textContent=w.error?'Wetter vorübergehend nicht verfügbar':meta[1]+' · Luftfeuchte '+(w.humidity??'–')+' % · Wind '+(w.wind_speed??'–')+' '+w.wind_unit+(w.stale?' · zuletzt bekannt':'')}catch(e){$('weather').hidden=true}}refresh();refreshWeather();setInterval(refresh,10000);setInterval(refreshWeather,600000);</script></body></html>
