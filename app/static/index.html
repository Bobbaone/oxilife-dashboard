<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pool</title>
<style>
:root{--bg:#06151e;--card:#0d2632;--line:#1d3a46;--muted:#8eabb7;--good:#56d8a0;--bad:#ff6b6b;--accent:#44c7f4}*{box-sizing:border-box}body{margin:0;background:linear-gradient(160deg,#041018,#092533);color:#eefaff;font-family:Inter,system-ui,sans-serif;min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:28px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px}.brand h1{margin:0;font-size:28px}.brand p{margin:5px 0 0;color:var(--muted)}.status{display:flex;gap:8px;align-items:center}.dot{width:10px;height:10px;border-radius:50%;background:var(--bad)}.dot.on{background:var(--good);box-shadow:0 0 14px var(--good)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}.card{background:rgba(13,38,50,.9);border:1px solid var(--line);border-radius:22px;padding:22px;min-height:150px;box-shadow:0 14px 40px #0004}.label{color:var(--muted);font-size:14px}.value{font-size:42px;font-weight:750;margin-top:14px;letter-spacing:-1px}.unit{font-size:17px;color:var(--muted);margin-left:5px}.wide{grid-column:span 2}.schedule{display:flex;gap:32px;margin-top:22px}.schedule strong{display:block;font-size:25px;margin-top:5px}.footer{display:flex;justify-content:space-between;margin-top:20px;color:var(--muted);font-size:13px}.admin{color:var(--muted);text-decoration:none}@media(max-width:800px){.grid{grid-template-columns:repeat(2,1fr)}.wide{grid-column:span 2}}@media(max-width:500px){.wrap{padding:18px}.grid{grid-template-columns:1fr}.wide{grid-column:span 1}.value{font-size:36px}}
</style></head><body><main class="wrap"><div class="top"><div class="brand"><h1>Poolübersicht</h1><p>Oxilife · Live-Status</p></div><div class="status"><span id="dot" class="dot"></span><span id="online">Offline</span></div></div><section class="grid">
<div class="card"><div class="label">pH-Wert</div><div class="value"><span id="ph">–</span></div></div>
<div class="card"><div class="label">Redox</div><div class="value"><span id="rx">–</span><span class="unit">mV</span></div></div>
<div class="card"><div class="label">Wassertemperatur</div><div class="value"><span id="temperature">–</span><span class="unit">°C</span></div></div>
<div class="card"><div class="label">Hydrolyse</div><div class="value"><span id="hydrolysis">–</span><span class="unit">%</span></div></div>
<div class="card wide"><div class="label">Filterzeiten</div><div class="schedule"><div><span class="label">Start</span><strong id="filter_start">–</strong></div><div><span class="label">Ende</span><strong id="filter_end">–</strong></div></div></div>
<div class="card"><div class="label">Filterstufe</div><div class="value"><span id="filter_speed">–</span></div></div>
<div class="card"><div class="label">Uhrzeit</div><div class="value" id="clock">--:--</div></div>
</section><div class="footer"><span id="updated">Keine Daten</span><a class="admin" href="/admin">Admin</a></div></main>
<script>
const ids=['ph','rx','temperature','hydrolysis','filter_speed','filter_start','filter_end'];
const show=v=>v===null||v===undefined||v===''?'–':v;
async function refresh(){try{const r=await fetch('/api/status');const d=await r.json();ids.forEach(k=>document.getElementById(k).textContent=show(d[k]));document.getElementById('online').textContent=d.online?'Online':'Offline';document.getElementById('dot').classList.toggle('on',d.online);document.getElementById('updated').textContent=d.updated_at?'Aktualisiert: '+new Date(d.updated_at*1000).toLocaleString('de-DE'):d.error||'Keine Daten'}catch(e){}}
setInterval(()=>document.getElementById('clock').textContent=new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}),1000);refresh();setInterval(refresh,10000);
</script></body></html>
