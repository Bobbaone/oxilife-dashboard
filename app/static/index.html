<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Oxilife Dashboard</title>
<style>:root{--bg:#06151e;--card:#0d2632;--line:#1d3a46;--muted:#8eabb7;--good:#56d8a0;--bad:#ff6b6b;--warn:#ffc857}*{box-sizing:border-box}body{margin:0;background:linear-gradient(160deg,#041018,#092533);color:#eefaff;font-family:Inter,system-ui,sans-serif;min-height:100vh}.wrap{max-width:1180px;margin:auto;padding:28px}.top,.footer{display:flex;justify-content:space-between;align-items:center;gap:16px}.top{margin-bottom:28px}h1{margin:0;font-size:28px}.sub,.footer,.label,.empty{color:var(--muted)}.sub{margin:5px 0 0}.status{display:flex;gap:8px;align-items:center}.dot{width:10px;height:10px;border-radius:50%;background:var(--bad)}.dot.on{background:var(--good);box-shadow:0 0 14px var(--good)}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}.card{background:rgba(13,38,50,.92);border:1px solid var(--line);border-radius:22px;padding:22px;min-height:150px;box-shadow:0 14px 40px #0004}.card.warn{border-color:var(--warn)}.value{font-size:42px;font-weight:750;margin-top:14px;letter-spacing:-1px}.unit{font-size:17px;color:var(--muted);margin-left:5px}.gauge{height:9px;background:#06151e;border-radius:8px;margin-top:20px;overflow:hidden}.gauge i{display:block;height:100%;background:linear-gradient(90deg,#44c7f4,#56d8a0)}.statusvalue{font-size:28px}.footer{margin-top:20px;font-size:13px}.footer a{color:var(--muted)}.empty{grid-column:1/-1;text-align:center;padding:60px;border:1px dashed var(--line);border-radius:22px}@media(max-width:500px){.wrap{padding:18px}.value{font-size:36px}}</style></head>
<body><main class="wrap"><div class="top"><div><h1>Oxilife Dashboard</h1><p class="sub">Live-Status</p></div><div class="status"><span id="dot" class="dot"></span><span id="online">Offline</span></div></div><section id="grid" class="grid"></section><div class="footer"><span id="updated">Keine Daten</span><a href="/admin">Admin</a></div></main>
<script>const $=x=>document.getElementById(x),esc=x=>String(x??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function formatted(p){if(p.value===null||p.value===undefined||p.value==='')return '–';if(p.data_type==='number'){const n=Number(p.value)*Number(p.scale);return Number.isFinite(n)?n.toLocaleString('de-DE',{minimumFractionDigits:p.decimals,maximumFractionDigits:p.decimals}):esc(p.value)}if(p.data_type==='boolean')return Number(p.value)?'Ja':'Nein';return esc(p.value)}
function card(p){const n=p.data_type==='number'?Number(p.value)*Number(p.scale):null,warn=Number.isFinite(n)&&((p.warning_low!==null&&n<p.warning_low)||(p.warning_high!==null&&n>p.warning_high));let extra='';if(p.widget_type==='gauge'&&Number.isFinite(n)&&p.min_value!==null&&p.max_value!==null){const pct=Math.max(0,Math.min(100,(n-p.min_value)/(p.max_value-p.min_value||1)*100));extra=`<div class="gauge"><i style="width:${pct}%"></i></div>`}const cls=p.widget_type==='status'?' statusvalue':'';return `<article class="card${warn?' warn':''}"><div class="label">${esc(p.name)}</div><div class="value${cls}">${formatted(p)}<span class="unit">${esc(p.unit)}</span></div>${extra}</article>`}
async function refresh(){try{const r=await fetch('/api/status'),d=await r.json();$('grid').innerHTML=d.datapoints.length?d.datapoints.map(card).join(''):'<div class="empty">Der Admin hat noch keine Datenpunkte für die Startseite freigegeben.</div>';$('online').textContent=d.online?'Online':'Offline';$('dot').classList.toggle('on',d.online);$('updated').textContent=d.updated_at?'Aktualisiert: '+new Date(d.updated_at*1000).toLocaleString('de-DE'):(d.error||'Keine Daten')}catch(e){$('updated').textContent='Dashboard nicht erreichbar'}}refresh();setInterval(refresh,10000);</script></body></html>
