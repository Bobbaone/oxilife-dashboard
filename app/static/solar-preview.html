<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>PoolMonitor · Solar-Test</title>
  <style>
    :root{--bg:#06151e;--card:#0d2632;--line:#1d3a46;--text:#eefaff;--muted:#8eabb7;--accent:#42c8f5;--good:#4fe0a1;--bad:#ff6070}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(160deg,#061219,#09232d);color:var(--text);font-family:Inter,system-ui,sans-serif;min-height:100vh}.wrap{max-width:1050px;margin:auto;padding:28px 18px}.top,.config,.status{display:flex;align-items:center;justify-content:space-between;gap:14px}.muted{color:var(--muted)}a{color:var(--muted)}.panel{background:rgba(13,38,50,.94);border:1px solid var(--line);border-radius:18px;padding:22px;margin-top:18px}.config{justify-content:flex-start;flex-wrap:wrap}input{min-width:240px;background:#071a23;color:white;border:1px solid var(--line);border-radius:10px;padding:11px 13px;font:inherit}button{border:0;border-radius:10px;background:var(--accent);color:#05202a;font-weight:750;padding:12px 16px;cursor:pointer}.hero{display:grid;grid-template-columns:1.25fr 1fr;gap:14px}.power{font-size:clamp(50px,9vw,88px);font-weight:800;line-height:1}.power small{font-size:20px}.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}.card{border:1px solid var(--line);border-radius:14px;padding:16px}.card b{display:block;font-size:24px;margin-top:6px}.good{color:var(--good)}.bad{color:var(--bad)}.bar{height:10px;border-radius:99px;background:#061820;overflow:hidden;margin-top:18px}.bar i{display:block;height:100%;background:linear-gradient(90deg,#42c8f5,#4fe0a1);border-radius:99px}.msg{margin-top:10px;min-height:22px}@media(max-width:700px){.hero,.cards{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}}
  </style>
</head>
<body><main class="wrap">
  <div class="top"><div><h1>Solar-Testansicht</h1><p class="muted">APsystems EZ1 · nur lesender Test, noch ohne Aufzeichnung</p></div><a href="/statistics">← Statistiken</a></div>
  <section class="panel"><h2>Verbindung</h2><div class="config"><input id="ip" inputmode="decimal" placeholder="EZ1-IP, z. B. 192.168.5.88"><button onclick="save()">Verbinden und speichern</button><button onclick="load()">Neu abrufen</button></div><div id="msg" class="msg muted"></div></section>
  <section id="result" class="panel" hidden>
    <div class="hero"><div><span class="muted">Solarleistung aktuell</span><div class="power"><span id="power">–</span> <small>W</small></div><div class="bar"><i id="bar"></i></div></div><div class="card"><span class="muted">Status</span><b id="status">–</b><p id="device" class="muted"></p></div></div>
    <div class="cards"><div class="card"><span class="muted">Heute erzeugt</span><b id="today">–</b></div><div class="card"><span class="muted">Gesamtertrag</span><b id="total">–</b></div><div class="card"><span class="muted">Leistungsgrenze</span><b id="limit">–</b></div></div>
    <h3>PV-Eingänge</h3><div class="cards"><div class="card"><span class="muted">Eingang 1</span><b id="p1">–</b><div id="e1" class="muted"></div></div><div class="card"><span class="muted">Eingang 2</span><b id="p2">–</b><div id="e2" class="muted"></div></div><div class="card"><span class="muted">Letzter Abruf</span><b id="updated">–</b></div></div>
  </section>
</main><script>
const $=id=>document.getElementById(id),fmt=(value,digits=2)=>Number(value).toLocaleString('de-DE',{minimumFractionDigits:digits,maximumFractionDigits:digits});
async function api(url,options){const response=await fetch(url,options),data=await response.json();if(response.status===401){location.href='/admin';throw Error('Anmeldung erforderlich')}if(!response.ok)throw Error(data.detail||'Fehler');return data}
function render(data){const solar=data.solar,max=Math.max(1,solar.maximum_power);$('ip').value=data.ip_address;$('power').textContent=fmt(solar.total.power_w,0);$('today').textContent=fmt(solar.total.today_kwh)+' kWh';$('total').textContent=fmt(solar.total.total_kwh)+' kWh';$('limit').textContent=fmt(max,0)+' W';$('bar').style.width=Math.min(100,solar.total.power_w/max*100)+'%';$('p1').textContent=fmt(solar.input_1.power_w,0)+' W';$('e1').textContent='Heute '+fmt(solar.input_1.today_kwh)+' kWh · Gesamt '+fmt(solar.input_1.total_kwh)+' kWh';$('p2').textContent=fmt(solar.input_2.power_w,0)+' W';$('e2').textContent='Heute '+fmt(solar.input_2.today_kwh)+' kWh · Gesamt '+fmt(solar.input_2.total_kwh)+' kWh';$('updated').textContent=new Date(solar.updated_at*1000).toLocaleTimeString('de-DE');$('status').textContent=solar.alarm_active?'Alarm':'Online · keine Alarme';$('status').className=solar.alarm_active?'bad':'good';$('device').textContent=(solar.device.devVer||'EZ1')+' · '+(solar.device.deviceId||solar.device_id||'');$('result').hidden=false;$('msg').textContent='Verbunden mit '+data.ip_address}
async function load(){try{$('msg').textContent='EZ1 wird abgefragt …';const data=await api('/api/admin/solar-preview');if(!data.configured){$('ip').value='192.168.5.88';$('msg').textContent='IP prüfen und auf „Verbinden und speichern“ klicken.';return}render(data)}catch(error){$('msg').textContent=error.message}}
async function save(){try{$('msg').textContent='Verbindung wird getestet …';const data=await api('/api/admin/solar-preview',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({ip_address:$('ip').value.trim()})});render(data)}catch(error){$('msg').textContent=error.message}}
load();
</script></body></html>
