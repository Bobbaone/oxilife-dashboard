services:
  oxilife-dashboard:
    image: ghcr.io/bobbaone/oxilife-dashboard:latest
    container_name: oxilife-dashboard
    restart: unless-stopped
    ports:
      - "8090:8000"
    environment:
      TZ: Europe/Berlin
      TASMOTA_BASE_URL: ${TASMOTA_BASE_URL:-http://192.168.1.50}
      TASMOTA_DISPLAY_NAME: Modbus
      TASMOTA_STATUS_PATH: /cm?cmnd=Status%2010
      SHELLY_PLUG_IP: ${SHELLY_PLUG_IP:-192.168.5.233}
      SHELLY_POLL_SECONDS: ${SHELLY_POLL_SECONDS:-60}
      POLL_SECONDS: 10
      ADMIN_USER: admin
      ADMIN_PASSWORD: wasserwerte
      SESSION_SECRET: ${SESSION_SECRET:-bitte-unbedingt-aendern}
      SESSION_HTTPS_ONLY: ${SESSION_HTTPS_ONLY:-false}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ALERT_EMAIL_TO: ${ALERT_EMAIL_TO:-}
      ALERT_COOLDOWN_SECONDS: ${ALERT_COOLDOWN_SECONDS:-3600}
      WEATHER_POSTAL_CODE: "75015"
      WEATHER_REFRESH_SECONDS: 900
      FILTER_SPEED_COMMAND_1: /cm?cmnd=NPFiltrationspeed%201
      FILTER_SPEED_COMMAND_2: /cm?cmnd=NPFiltrationspeed%202
      FILTER_SPEED_COMMAND_3: /cm?cmnd=NPFiltrationspeed%203
      FILTER_OFF_COMMAND: /cm?cmnd=NPFiltration%200
      BACKWASH_COMMAND: /cm?cmnd=NPFiltrationmode%2013
    volumes:
      - oxilife-data:/app/data

volumes:
  oxilife-data:
    name: oxilife-dashboard-data
